spring:
  application:
    name:
      cim-server
  
# web port
server:
  port: 8081
  
# enable swagger
springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    root: info

# enable zk
app:
  zk:
    switch: true
    addr: 127.0.0.1:2181
    connect:
      timeout: 30000
    root: /route # zk root path
# cim server config
cim:
  server:
    port: 11211
  route:
    url: http://localhost:8083/ # route url suggested that this is Nginx address
  heartbeat:
    time: 30 # cim heartbeat time(seconds)
  otel:
    enabled: ${OTEL_ENABLED:false}

# OpenTelemetry 配置 (only effective when cim.otel.enabled=true)
management:
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_HTTP_ENDPOINT:http://localhost:4318}/v1/traces
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_HTTP_ENDPOINT:http://localhost:4318}/v1/metrics
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenTelemetry gRPC endpoint for SDK exporter
otel:
  exporter:
    otlp:
      grpc:
        endpoint: ${OTEL_EXPORTER_OTLP_GRPC_ENDPOINT:http://localhost:4317}

