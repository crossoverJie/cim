spring:
  application:
    name:
      cim-server
  
# web port
server:
  port: 8081
  
# enable swagger
springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    root: info

# enable zk
app:
  zk:
    switch: true
    addr: 127.0.0.1:2181
    connect:
      timeout: 30000
    root: /route # zk root path
# cim server config
cim:
  server:
    port: 11211
  route:
    url: http://localhost:8083/ # route url suggested that this is Nginx address
  heartbeat:
    time: 30 # cim heartbeat time(seconds)

# OpenTelemetry 配置
# management.otlp.tracing.endpoint: Jaeger 的 OTLP HTTP 接收端点
# management.tracing.sampling.probability: 采样率，1.0 表示 100% 采样（生产环境建议降低）
# management.endpoints.web.exposure.include: 暴露 Actuator 端点用于查看 Metrics
management:
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
    metrics:
      endpoint: http://localhost:4318/v1/metrics
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics
